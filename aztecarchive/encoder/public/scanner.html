<!doctype html>
<html>
<head><meta charset="utf-8"><title>Aztec Scan</title></head>
<body>
  <h1>Aztec Scanner (web)</h1>
  <video id="video" autoplay playsinline></video>
  <pre id="status"></pre>
  <script src="https://unpkg.com/@zxing/browser@0.0.9/umd/index.min.js"></script>
  <script>
    const status = document.getElementById('status');
    const codeReader = new ZXing.BrowserBarcodeReader();
    async function start(){
      const videoInputDevices = await codeReader.listVideoInputDevices();
      const deviceId = videoInputDevices[0]?.deviceId;
      codeReader.decodeFromVideoDevice(deviceId, 'video', (result, err) => {
        if(result){ status.textContent = 'Decoded: ' + result.getText().slice(0,50); }
      });
    }
    start().catch(e=>status.textContent = e.message);
  </script>
</body>
</html>
